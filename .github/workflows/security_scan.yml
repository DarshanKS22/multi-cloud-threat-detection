name: Multi-Cloud Security Scan

on:
  push:
    branches:
      - main

jobs:
  security-scan:

    runs-on: ubuntu-latest

    steps:

      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install Dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install prowler flask

      # Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        continue-on-error: true
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      # Run AWS Security Scan
      - name: Run AWS Security Scan
        continue-on-error: true
        run: |
          mkdir -p output
          prowler aws --region ${{ secrets.AWS_DEFAULT_REGION }}

      # Run Threat Analyzer
      - name: Run Threat Analyzer
        continue-on-error: true
        run: |
          python3 scripts/parser.py

      # Run Alert Engine
      - name: Run Alert Engine
        continue-on-error: true
        run: |
          python3 scripts/alert.py

      # Upload Prowler Reports
      - name: Upload Prowler Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Prowler-Reports
          path: |
            output/**/*.html
            output/**/*.csv
            output/**/*.json
            output/**/*.ocsf.json
          if-no-files-found: warn

      # Upload Compliance Reports
      - name: Upload Compliance Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Compliance-Reports
          path: output/compliance/**
          if-no-files-found: warn




